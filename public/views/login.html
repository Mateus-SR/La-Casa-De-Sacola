<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

  <style>
    .login-bg {
      background-position: center 58%;
    }

    .animated-page {
      animation: fade-in 1500ms ease-out both;
    }

    .animated-card {
      background-size: 180% 180%;
      animation: slide-in-right 1800ms cubic-bezier(0.22, 1, 0.36, 1) both,
                 wine-gradient-flow 22s ease-in-out infinite;
    }

    .reveal {
      opacity: 0;
      transform: translateY(16px);
      animation: reveal-up 1200ms ease-out forwards;
    }

    .brand-title {
      transition: transform 700ms ease, text-shadow 700ms ease, letter-spacing 700ms ease, color 700ms ease;
      transform-origin: center;
    }

    .brand-title:hover {
      transform: translateY(-2px) scale(1.02);
      text-shadow: 0 10px 22px rgba(255, 255, 255, 0.35);
      letter-spacing: 0.035em;
      color: #ffffff;
    }

    .d-1 { animation-delay: 260ms; }
    .d-2 { animation-delay: 520ms; }
    .d-3 { animation-delay: 780ms; }
    .d-4 { animation-delay: 1040ms; }
    .d-5 { animation-delay: 1300ms; }
    .d-6 { animation-delay: 1560ms; }

    .form-control {
      transition: box-shadow 520ms ease, transform 520ms ease, background-color 520ms ease;
    }

    .form-control:focus {
      background-color: rgba(255, 255, 255, 0.95);
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.25);
      transform: translateY(-1px);
    }

    .form-control:hover {
      background-color: rgba(255, 255, 255, 0.96);
      box-shadow: 0 8px 16px rgba(255, 255, 255, 0.18);
      transform: translateY(-1px) scale(1.005);
    }

    .animated-btn {
      transition: transform 620ms ease, box-shadow 620ms ease, background-color 620ms ease;
    }

    .animated-btn:hover {
      transform: translateY(-1px) scale(1.015);
      box-shadow: 0 8px 18px rgba(255, 255, 255, 0.22);
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slide-in-right {
      from {
        opacity: 0;
        transform: translateX(34px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes reveal-up {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes wine-gradient-flow {
      0% { background-position: 100% 100%; }
      50% { background-position: 30% 30%; }
      100% { background-position: 100% 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      .animated-page,
      .animated-card,
      .reveal {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }

      .form-control,
      .animated-btn {
        transition: none !important;
      }
    }

    @media (min-width: 768px) {
      .login-bg {
        background-position: center 78%;
      }
    }
  </style>
</head>

<body class="animated-page login-bg h-screen flex items-center justify-center bg-cover"
  style="background-image: url('../img/img_login.png');">

  <!-- Overlay escuro -->
  <div class="absolute inset-0 bg-black/55"></div>

  <!-- CARD -->
  <div class="animated-card absolute right-0 top-0 min-h-screen w-full md:h-screen md:w-1/2 flex items-center justify-center bg-gradient-to-tl from-black/75 via-zinc-900/55 to-black/20 backdrop-blur-xl rounded-none">
    
    <div class="p-6 sm:p-8 md:p-10 w-full max-w-md lg:max-w-xl mx-auto">
      <!-- LOGO -->
      <h1 class="reveal d-1 brand-title text-white text-3xl sm:text-4xl md:text-5xl text-center mb-8 md:mb-12 tracking-wide font-bold leading-tight whitespace-normal sm:whitespace-nowrap"
          style="font-family: 'Anton', sans-serif;">
        LA CASA <span class="bg-red-600 px-2 py-1 align-middle">DE</span> SACOLA
      </h1>

      <!-- FORM -->
      <form class="flex flex-col w-full">

        <!-- EMAIL -->
        <input type="email" placeholder="Email"
          class="reveal d-2 form-control w-full mb-5 md:mb-6 p-3 sm:p-4 text-base sm:text-lg rounded bg-white/80 outline-none focus:ring-2 focus:ring-red-500 transition">

        <!-- SENHA -->
        <input type="password" placeholder="Senha"
          class="reveal d-3 form-control w-full mb-3 md:mb-4 p-3 sm:p-4 text-base sm:text-lg rounded bg-white/80 outline-none focus:ring-2 focus:ring-red-500 transition">

        <!-- ESQUECI SENHA -->
        <a href="#" class="reveal d-4 text-sm sm:text-base text-gray-300 mb-6 md:mb-8 hover:text-red-400 text-right transition-colors duration-300">
          Esqueci minha senha
        </a>

        <!-- BOTÃO -->
        <button
          class="reveal d-5 animated-btn w-full bg-red-600 hover:bg-red-700 text-white p-3 sm:p-4 text-base sm:text-lg rounded transition duration-300 shadow-lg">
          Entrar
        </button>

      </form>

      <!-- CADASTRO -->
      <p class="reveal d-6 text-gray-300 text-sm sm:text-base text-center mt-6 md:mt-8">
        Não tem conta?
        <a href="#" class="text-red-500 hover:underline">
          Criar conta
        </a>
      </p>
    </div>

  </div>

</body>
</html>
